<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}RetakeScheduler{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900 text-sm">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-2xl mx-auto px-5 py-3.5 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">R</div>
        <div>
          <p class="font-semibold text-slate-900 text-[13px] leading-none">RetakeScheduler</p>
          <p class="text-[10px] text-slate-400 mt-0.5">University of Southern Mississippi</p>
        </div>
      </a>
      <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full">Student Portal</span>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-5 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="text-center py-5 text-xs text-slate-400 border-t border-slate-100">
    Need help? Contact your instructor · USM Academic Affairs
  </footer>

  <!-- Toasts -->
  <div id="toasts" class="fixed bottom-5 right-5 flex flex-col gap-2 z-50 pointer-events-none"></div>
  <script>
    function showToast(msg, type='info'){
      const c={success:'bg-emerald-500',error:'bg-red-500',info:'bg-blue-500'};
      const el=document.createElement('div');
      el.className=`${c[type]} pointer-events-auto text-white text-sm px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-3 max-w-sm`;
      el.innerHTML=`<span class="flex-1">${msg}</span><button onclick="this.parentElement.remove()" class="opacity-60 hover:opacity-100 text-base leading-none">×</button>`;
      document.getElementById('toasts').appendChild(el);
      setTimeout(()=>el.remove(),4500);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
