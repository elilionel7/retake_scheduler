<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — RetakeScheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-base shrink-0">R</div>
      <div>
        <p class="font-bold text-slate-900 text-base leading-none">RetakeScheduler</p>
        <p class="text-[11px] text-slate-500 mt-0.5">Instructor & Admin Portal</p>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-100">
        <h1 class="font-semibold text-slate-900">Sign in</h1>
        <p class="text-xs text-slate-400 mt-0.5">Use your instructor credentials to continue.</p>
      </div>

      <form method="POST" class="px-6 py-5 flex flex-col gap-4">

        {% if error %}
        <div class="flex items-start gap-2.5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
          <span class="shrink-0 mt-0.5">⚠️</span>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Email Address</label>
          <input type="email" name="email" required autofocus placeholder="you@usm.edu"
                 class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
                 class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all text-sm mt-1">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-5">
      <a href="/schedule" class="text-blue-600 hover:underline">← Go to Student Portal</a>
    </p>
  </div>

</body>
</html>
