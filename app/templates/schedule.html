<!DOCTYPE html>
<html>
  <head>
    <title>Schedule Retake</title>
    <style>
      :root {
        --primary: #a8d8ea;
        --secondary: #f9b5ac;
        --accent: #ee6c4d;
        --text: #2b2d42;
      }
      body {
        font-family: 'Comic Neue', cursive;
        margin: 0;
        padding: 20px;
        background: var(--primary);
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        position: relative;
      }
      h1 {
        color: var(--accent);
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2.5em;
      }
      .form-section {
        background: white;
        padding: 25px;
        border-radius: 15px;
        margin: 2rem auto;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      label {
        display: block;
        margin: 1rem 0 0.5rem;
        color: var(--text);
        font-weight: 700;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--secondary);
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }
      input:focus,
      select:focus {
        border-color: var(--accent);
        outline: none;
      }
      button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        margin-top: 1.5rem;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        transition: transform 0.3s, opacity 0.3s;
      }
      button:hover:not(:disabled) {
        transform: translateY(-2px);
        opacity: 0.9;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .slot-info {
        font-size: 0.9em;
        color: #666;
        display: block;
        margin-top: 0.25rem;
      }
      .loading {
        position: relative;
        pointer-events: none;
      }
      .loading::after {
        content: '';
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: translateY(-50%) rotate(360deg);
        }
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>📅 Schedule Your Retake</h1>

      <!-- Book New Appointment Form -->
      <div class="form-section">
        <h2>🎯 Book New Appointment</h2>
        <form method="POST">
          <label>Your Student ID:</label>
          <input
            type="text"
            name="student_id"
            required
            placeholder="Enter your student ID..."
          />

          <label>Choose Time Slot:</label>
          <select name="schedule_id" required>
            {% for slot in available_slots %}
            <option value="{{ slot.id }}">
              {{ slot.date }} at {{ slot.time }}
              <span class="slot-info"
                >(🕑 {{ slot.time }}, {{ slot.current_bookings }}/{{
                slot.max_capacity }} slots left)</span
              >
            </option>
            {% endfor %}
          </select>
          <div class="pagination-links" style="margin-top: 1rem">
            {% if pagination.has_prev %}
            <a
              href="?page={{ pagination.prev_num }}&per_page={{ pagination.per_page }}"
              >Previous</a
            >
            {% endif %} {% if pagination.has_next %}
            <a
              href="?page={{ pagination.next_num }}&per_page={{ pagination.per_page }}"
              >Next</a
            >
            {% endif %}
          </div>
          <button type="submit">📅 Confirm Booking</button>
        </form>
      </div>

      <div class="form-section">
        <h2>✏️ Reschedule Appointment</h2>
        <form id="modify-form">
          <label>Your Student ID:</label>
          <input
            type="text"
            id="mod_student_id"
            required
            placeholder="Enter your student ID..."
          />

          <label>New Time Slot:</label>
          <select id="new_schedule_id" required>
            {% for slot in available_slots %}
            <option value="{{ slot.id }}">
              {{ slot.date }} at {{ slot.time }}
              <span class="slot-info"
                >({{ slot.current_bookings }}/{{ slot.max_capacity }} slots
                left)</span
              >
            </option>
            {% endfor %}
          </select>
          <button type="submit">🔄 Update Schedule</button>
        </form>
      </div>
    </div>

    <script>
      document
        .getElementById('modify-form')
        .addEventListener('submit', async function (e) {
          e.preventDefault();
          const form = e.target;
          const button = form.querySelector('button[type="submit"]');
          const studentId = document
            .getElementById('mod_student_id')
            .value.trim();
          const newScheduleId =
            document.getElementById('new_schedule_id').value;

          if (!studentId || !newScheduleId) {
            alert('Please fill out all fields.');
            return;
          }

          try {
            button.disabled = true;
            button.classList.add('loading');

            const response = await fetch('/schedule/modify', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                student_id: studentId,
                new_schedule_id: newScheduleId,
              }),
            });

            const data = await response.json();

            if (response.ok) {
              alert(
                `✅ Success!\n${data.message}\nNew time: ${data.new_date} at ${data.new_time}`
              );
              window.location.href = `/schedule/summary?student_id=${studentId}`;
            } else {
              alert(`❌ Error: ${data.error || 'Unknown error occurred'}`);
            }
          } catch (error) {
            console.error('Error:', error);
            alert('⚠️ Network error - Please check your connection');
          } finally {
            button.disabled = false;
            button.classList.remove('loading');
          }
        });
    </script>
  </body>
</html>
